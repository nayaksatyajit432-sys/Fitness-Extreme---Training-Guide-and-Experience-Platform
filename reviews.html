<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Fitness Review</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="navbar-container"></div>

<div class="container py-5 text-center">

<h1 class="mb-5">AI Body Analysis</h1>

<!-- CARD -->
<div class="review-card p-4 mx-auto">

<input type="text" id="name" placeholder="Your Name" class="form-control mb-3">
<input type="number" id="age" placeholder="Age" class="form-control mb-3">
<input type="number" id="height" placeholder="Height (cm)" class="form-control mb-3">
<input type="number" id="weight" placeholder="Weight (kg)" class="form-control mb-3">

<input type="file" id="imageUpload" accept="image/*" class="form-control mb-3">

<button id="analyzeBtn" class="btn btn-warning w-100">
Analyze Body
</button>

</div>

<!-- IMAGE -->
<div class="mt-4">
<img id="previewImage" class="preview-img">
</div>

<!-- LOADING -->
<div id="loadingBox" class="mt-5" style="display:none;">
<div class="scanner"></div>
<p class="mt-3">Analyzing your body...</p>
</div>

<!-- RESULT -->
<div id="resultBox" class="mt-5" style="display:none;">

<h3 id="resultName"></h3>

<!-- BMI CIRCLE -->
<div class="bmi-circle">
<span id="bmiValue">0</span>
</div>

<p id="bmiResult"></p>
<p id="fitnessAdvice"></p>

<!-- ✅ WORKOUT PLAN (CORRECT POSITION) -->
<div id="workoutPlan" class="mt-4" style="display:none;">

<h4 class="mb-3">Recommended Plan</h4>

<p id="workoutType"></p>
<p id="workoutProgram"></p>

<ul id="exerciseListPlan"></ul>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
