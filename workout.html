<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="navbar-container"></div>

<div class="container text-center py-5">

<h1 id="workoutTitle">Workout</h1>

<!-- 🔥 PROGRESS BAR -->
<div class="progress mt-4" style="height:10px;">
  <div id="progressBar" class="progress-bar bg-warning" style="width:0%"></div>
</div>

<h3 id="workoutExercise" class="mt-4"></h3>

<img id="workoutImage" src="" class="mt-3" style="width:100%; max-width:500px; border-radius:10px;">

<h2 id="timer" class="mt-4">30</h2>

<div class="mt-4">
<button id="nextBtn" class="btn btn-warning">Skip ▶</button>
</div>

<!-- 🔥 FINISH BUTTON -->
<button id="finishBtn" class="btn btn-success mt-4" style="display:none;">
Go to Programs
</button>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script src="js/workout.js"></script>

</body>
</html>
