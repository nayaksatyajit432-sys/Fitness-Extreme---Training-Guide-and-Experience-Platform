<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Program Details</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>


<!-- PROGRAM HERO -->

<section class="program-hero">

<div class="container">

<h1 id="programTitle">Program Name</h1>
<p id="programSubtitle">Short description of program</p>

</div>

</section>


<!-- MAIN CONTENT -->

<section class="program-detail-section">

<div class="container">

<div class="row g-5 align-items-center">

<!-- LEFT (GIF / IMAGE) -->
<div class="col-md-6">

<div class="program-visual">

<img id="programGif" src="" alt="Exercise" />

</div>

</div>


<!-- RIGHT (INFO) -->
<div class="col-md-6">

<div class="program-info">

<h3>Exercise</h3>
<div id="exerciseList" class="mb-3"></div>

<h2 id="exerciseTitle">Exercise Name</h2>

<p id="exerciseDesc">
Exercise description will appear here.
</p>

<ul class="program-stats">
<li><strong>Duration:</strong> <span id="programDuration">--</span></li>
<li><strong>Level:</strong> <span id="programLevel">--</span></li>
<li><strong>Calories:</strong> <span id="programCalories">--</span></li>
</ul>

<button id="startWorkoutBtn" class="btn btn-warning mt-4 w-100">
Start Workout
</button>

</div>

</div>

</div>

</div>

</section>


<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- ADD THIS LINE -->
<script src="js/data.js"></script>

<script src="js/script.js"></script>

</body>
</html>
